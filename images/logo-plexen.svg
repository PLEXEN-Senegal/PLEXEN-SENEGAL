<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Barlow+Condensed:wght@200;300&display=swap');
    </style>
  </defs>

  <!-- Icône losange centrée -->
  <g transform="translate(160,62)">
    <polygon points="0,-52 52,0 0,52 -52,0"
      fill="none" stroke="#FF6B00" stroke-width="2.8" stroke-linejoin="round"/>
    <polygon points="0,-34 34,0 0,34 -34,0"
      fill="none" stroke="rgba(255,107,0,0.28)" stroke-width="1" stroke-linejoin="round"/>
    <line x1="-52" y1="0" x2="-34" y2="0" stroke="#FF6B00" stroke-width="1.2" opacity="0.4"/>
    <line x1="34" y1="0" x2="52" y2="0" stroke="#FF6B00" stroke-width="1.2" opacity="0.4"/>
    <path d="M 10,-26 L -9,2 L 5,2 L -10,26"
      fill="none" stroke="#FF6B00" stroke-width="3.5"
      stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- PLEXEN -->
  <text x="160" y="138"
    font-family="Oswald,Arial Black,sans-serif"
    font-weight="700" font-size="42"
    fill="#FFFFFF" letter-spacing="8"
    text-anchor="middle">PLEXEN</text>

  <!-- Barre décorative -->
  <rect x="58" y="145" width="38" height="1.2" fill="rgba(255,107,0,0.3)"/>
  <rect x="100" y="144" width="120" height="2.2" fill="#FF6B00"/>
  <rect x="224" y="145" width="38" height="1.2" fill="rgba(255,107,0,0.3)"/>

  <!-- Sous-titre -->
  <text x="160" y="162"
    font-family="Barlow Condensed,Arial Narrow,sans-serif"
    font-weight="200" font-size="9"
    fill="rgba(255,255,255,0.45)" letter-spacing="3.5"
    text-anchor="middle">ÉTUDE · CONTRÔLE · RÉALISATION</text>

  <!-- ÉLECTRIQUE -->
  <text x="160" y="176"
    font-family="Oswald,Arial Narrow,sans-serif"
    font-weight="400" font-size="11"
    fill="#FF6B00" letter-spacing="5"
    text-anchor="middle">ÉLECTRIQUE</text>
</svg>
